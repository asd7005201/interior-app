<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <?!= include('styles') ?>
  <style>
    html,body{height:100%}
    body.embed-mode{min-height:100%;overflow-y:auto}
    #app{min-height:100vh;padding-bottom:110px}
    .embed-mode #app{min-height:100%;padding-bottom:110px}
    .landing-wrap{min-height:100vh;display:flex;flex-direction:column}
    .embed-mode .landing-wrap{min-height:100%}
    .landing-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 24px;text-align:center}
    .brand-tagline{font:600 17px/1.5 var(--ff);letter-spacing:0.12em;color:var(--color-warm-700);margin-bottom:24px}
    .hero-title{font:700 26px/1.35 var(--ff);letter-spacing:-0.02em;margin-bottom:12px;max-width:360px}
    .hero-sub{font:var(--f-body);color:var(--color-text-sub);max-width:360px;margin:0 auto 24px;line-height:1.7}
    .hero-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
    .hero-divider{width:40px;height:2px;background:var(--color-primary);opacity:0.4;margin:0 auto 28px}
    .point-grid{display:grid;gap:16px;width:100%;max-width:400px;margin:0 auto 28px;text-align:left}
    .point-item{display:flex;gap:14px;align-items:flex-start}
    .point-icon{width:32px;height:32px;border-radius:10px;background:var(--color-primary-soft);color:var(--color-primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-size:14px}
    .point-text strong{display:block;font:var(--f-sm);font-weight:600;margin-bottom:2px}
    .point-text span{font:var(--f-sm);color:var(--color-text-sub);line-height:1.5}
    .trust-row{display:flex;gap:24px;justify-content:center;margin:24px 0}
    .trust-item{text-align:center}
    .trust-num{font:700 20px/1.2 var(--ff);color:var(--color-primary)}
    .trust-label{font:var(--f-xs);color:var(--color-text-muted)}
    .landing-bottom{padding:0 20px 24px;max-width:520px;margin:0 auto;width:100%}
    .step-wrap{padding-top:28px;max-width:520px;margin:0 auto}
    .opts-grid{display:grid;gap:10px}
    .q-block{margin-bottom:24px;animation:fadeIn 250ms var(--ease)}
    .q-title{font:var(--f-h3);margin-bottom:4px}
    .q-desc{font:var(--f-sm);color:var(--color-text-sub);margin-bottom:12px;line-height:1.55}
    .q-separator{height:1px;background:var(--color-line);margin:20px 0 24px}
    .file-zone{border:2px dashed var(--color-warm-300);border-radius:var(--r-lg);padding:28px 20px;text-align:center;cursor:pointer;transition:all var(--motion) var(--ease)}
    .file-zone:hover{border-color:var(--color-primary);background:var(--color-primary-muted)}
    .file-list{margin-top:12px;display:grid;gap:8px}
    .file-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--color-warm-50);border-radius:var(--r-md);font:var(--f-sm)}
    .file-item .remove{margin-left:auto;cursor:pointer;color:var(--color-danger);font-weight:700;padding:4px 8px}
    .back-btn{position:fixed;top:12px;left:12px;z-index:101;width:40px;height:40px;border-radius:50%;background:var(--color-surface);box-shadow:var(--sh-sm);border:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .back-btn:active{background:var(--color-warm-100)}
    .back-btn svg{width:20px;height:20px;stroke:var(--color-warm-700);stroke-width:2.5;fill:none}
    .sticky-cta .skip-link{display:block;text-align:center;margin-top:8px;font:var(--f-xs);color:var(--color-text-muted);cursor:pointer}
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var APP_URL=<?!= JSON.stringify(app_url) ?>;
  var IS_EMBED=<?!= JSON.stringify(!!is_embed) ?>;
  var PS=<?!= settings_json ?>;
  var BOOTSTRAP_CFG=<?!= bootstrap_config_json || "null" ?> || null;
  var CONFIG_CACHE_KEY='pq_survey_cfg:'+[String(PS.app_version||'').trim(),String(PS.survey_version||'').trim()].join(':');
  var RESULT_BOOTSTRAP_PREFIX='pq_result_bootstrap:';
  var CACHED_CFG=readCachedConfig_();
  var CFG=CACHED_CFG||BOOTSTRAP_CFG||null, STATE={screen:'landing',step:0,answers:{},files:[]}, STEPS=[], $app=document.getElementById('app');
  var PREV_STEP_COUNT=0; // track step count changes for reset
  if(!CACHED_CFG&&BOOTSTRAP_CFG) writeCachedConfig_(BOOTSTRAP_CFG);

  function readCachedConfig_(){
    try{
      var raw=window.localStorage&&window.localStorage.getItem(CONFIG_CACHE_KEY);
      return raw?JSON.parse(raw):null;
    }catch(e){return null;}
  }
  function writeCachedConfig_(cfg){
    try{
      if(window.localStorage&&cfg) window.localStorage.setItem(CONFIG_CACHE_KEY,JSON.stringify(cfg));
    }catch(e){}
  }
  function storeResultBootstrap_(result, answers, contact){
    if(!result||!result.request_id||!result.share_token) return;
    var projectType=String(answers.Q000_PROJECT_TYPE||'').toUpperCase();
    var housingCode=projectType==='RESIDENTIAL'?(answers.R001_HOUSING_TYPE||''):(answers.C001_BIZ_TYPE||'');
    var areaCode=projectType==='RESIDENTIAL'?(answers.R002_AREA||''):(answers.C002_AREA||'');
    var scopeCode=projectType==='RESIDENTIAL'?(answers.R011_SCOPE_LEVEL||''):(answers.C011_SCOPE_LEVEL||'');
    var scheduleStart=answers.R320_START||answers.C320_START||'';
    var scheduleEnd=answers.R321_END||answers.C321_END||'';
    var bootstrap={
      _bootstrap:true,
      request:{
        request_id:result.request_id,
        customer_name:contact.name||'',
        project_type:projectType,
        project_type_label:getOptionLabel_('Q000_PROJECT_TYPE',projectType)||projectType,
        housing_type:housingCode,
        housing_type_label:getOptionLabel_(projectType==='RESIDENTIAL'?'R001_HOUSING_TYPE':'C001_BIZ_TYPE',housingCode)||housingCode,
        area_py:areaCode,
        area_label:getOptionLabel_(projectType==='RESIDENTIAL'?'R002_AREA':'C002_AREA',areaCode)||areaCode,
        scope_level:scopeCode,
        scope_level_label:getOptionLabel_(projectType==='RESIDENTIAL'?'R011_SCOPE_LEVEL':'C011_SCOPE_LEVEL',scopeCode)||scopeCode,
        flow_mode:answers.Q000_FLOW_MODE||'',
        flow_mode_label:getOptionLabel_('Q000_FLOW_MODE',answers.Q000_FLOW_MODE||'')||String(answers.Q000_FLOW_MODE||''),
        created_at:new Date().toISOString(),
        status:'NEW',
        schedule_start_label:scheduleStart,
        schedule_end_label:scheduleEnd,
        address_label:contact.address||'',
        customer_note_label:contact.note||''
      },
      estimate:result.estimate||{min:0,max:0,flags:[]},
      flags:result.flags||[],
      recommendations:[],
      answers:[],
      answer_groups:[],
      notice_text:'',
      recommendation_status:'PENDING',
      recommendation_count:0
    };
    try{
      if(window.sessionStorage){
        window.sessionStorage.setItem(RESULT_BOOTSTRAP_PREFIX+result.request_id+':'+result.share_token,JSON.stringify(bootstrap));
      }
    }catch(e){}
  }
  function getOptionLabel_(questionId, optionCode){
    if(!CFG||!CFG.options||!questionId||!optionCode) return '';
    for(var i=0;i<CFG.options.length;i++){
      var item=CFG.options[i]||{};
      if(String(item.question_id||'')!==String(questionId)) continue;
      if(String(item.option_code||'')!==String(optionCode)) continue;
      return String(item.option_label||'');
    }
    return '';
  }

  function init(){
    applyEmbedMode_();
    render();
    if(CFG){
      setTimeout(function(){refreshConfig_(true);},1200);
      return;
    }
    refreshConfig_(false);
  }
  function refreshConfig_(silent){
    if(!silent) showLoading('설문 데이터를 불러오는 중...');
    google.script.run.withSuccessHandler(function(c){
      if(!c) return;
      CFG=c;
      writeCachedConfig_(c);
      hideLoading();
      if(STATE.screen==='landing') render();
    }).withFailureHandler(function(e){
      hideLoading();
      if(!CFG) showError(e.message);
    }).loadSurveyConfig();
  }
  function uiText(key, fallback){
    var list=(CFG&&CFG.uiContent)||[];
    for(var i=0;i<list.length;i++){
      if(String((list[i]||{}).content_key||'')!==String(key||'')) continue;
      return String(list[i].body||list[i].title||list[i].content_value||fallback||'');
    }
    return String(fallback||'');
  }

  function applyEmbedMode_(){
    if(!IS_EMBED) return;
    document.documentElement.classList.add('embed-mode');
    document.body.classList.add('embed-mode');
  }

  function render(){
    if(STATE.screen==='landing') renderLanding();
    else if(STATE.screen==='survey'){buildSteps();renderStep();}
    else if(STATE.screen==='submitting') $app.innerHTML='<div class="loading-overlay"><div class="spinner"></div><div class="loading-text">접수 저장 중</div></div>';
    else if(STATE.screen==='done') $app.innerHTML='<div class="container" style="padding-top:60px;text-align:center"><div class="fade-in"><div style="width:64px;height:64px;border-radius:50%;background:var(--color-success-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 20px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-success)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><h2>'+esc(uiText('survey_submit_success_title','접수 완료'))+'</h2><p style="color:var(--color-text-sub);margin:12px 0">'+esc(uiText('survey_submit_success_body','잠시 후 결과로 이동합니다.'))+'</p></div></div>';
  }

  // ---- LANDING ----
  function renderLanding(){
    var ui=(CFG&&CFG.uiContent)||[];
    var hero=ui.find(function(u){return u.content_key==='landing_hero'})||{};
    var chips=ui.filter(function(u){return u.content_type==='CHIP'}).sort(srt);
    var points=ui.filter(function(u){return u.content_type==='POINT'}).sort(srt);
    var notice=ui.find(function(u){return u.content_type==='NOTICE'})||{};
    var h='<div class="landing-wrap fade-in"><div class="landing-top">';
    h+='<div class="brand-tagline">이상이 일상이 되는 시간</div>';
    h+='<h1 class="hero-title">'+(hero.title||PS.hero_title||'실무형 가견적, 빠르게 확인하세요')+'</h1>';
    h+='<p class="hero-sub">'+(hero.body||PS.hero_subtitle||'')+'</p>';
    if(chips.length){h+='<div class="hero-chips">';chips.forEach(function(c){h+='<span class="chip">'+esc(c.title)+'</span>';});h+='</div>';}
    h+='<div class="hero-divider"></div>';
    if(points.length){h+='<div class="point-grid">';points.forEach(function(p,i){h+='<div class="point-item"><div class="point-icon">'+(i+1)+'</div><div class="point-text"><strong>'+esc(p.title)+'</strong><span>'+esc(p.body||'')+'</span></div></div>';});h+='</div>';}
    h+='<div class="trust-row"><div class="trust-item"><div class="trust-num">4~6</div><div class="trust-label">평균 소요 분</div></div><div class="trust-item"><div class="trust-num">100%</div><div class="trust-label">모바일 최적화</div></div><div class="trust-item"><div class="trust-num">0</div><div class="trust-label">불필요한 질문</div></div></div>';
    h+='</div><div class="landing-bottom">';
    if(notice.title) h+='<div class="notice" style="margin-bottom:16px"><strong>'+esc(notice.title)+'</strong><br>'+esc(notice.body||'')+'</div>';
    h+='<button class="btn btn-primary btn-lg btn-block'+(CFG?'':' disabled')+'" onclick="PQ.start()"'+(CFG?'':' disabled')+'>'+(hero.cta_label||'가견적 시작하기')+'</button>';
    if(!CFG) h+='<div style="text-align:center;font:var(--f-xs);color:var(--color-text-muted);margin-top:10px">설문 구성을 불러오는 중입니다.</div>';
    h+='<div style="text-align:center;font:var(--f-xs);color:var(--color-text-muted);margin-top:12px;line-height:1.5">선택하지 않은 공정의 질문은 자동으로 건너뜁니다.<br>필요한 것만 빠르게 답변하실 수 있습니다.</div>';
    h+='</div></div>';
    $app.innerHTML=h;
  }

  // ---- STEP RENDER ----
  function renderStep(){
    if(!STEPS.length)return;
    if(STATE.step>=STEPS.length) STATE.step=STEPS.length-1;
    if(STATE.step<0) STATE.step=0;
    var sd=STEPS[STATE.step],total=STEPS.length,pct=Math.round(((STATE.step+1)/total)*100);
    var h='<div class="progress-bar"><div class="fill" style="width:'+pct+'%"></div></div>';
    h+='<button class="back-btn" onclick="PQ.prev()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>';
    h+='<div class="container step-wrap"><div class="step-header"><div class="step-counter">'+(STATE.step+1)+' / '+total+'</div>';
    h+='<div class="step-title">'+esc(sd.title)+'</div>';
    if(sd.desc) h+='<div class="step-desc">'+esc(sd.desc)+'</div>';
    h+='</div>';
    var qs=sd.questions||[];
    for(var i=0;i<qs.length;i++){
      if(i>0&&qs.length>1) h+='<div class="q-separator"></div>';
      h+=rQ(qs[i],qs.length>1);
    }
    h+='</div>';
    var isLast=STATE.step>=total-1, ok=chkReq(qs), allOpt=qs.every(function(q){return String(q.is_required)!=='Y';});
    h+='<div class="sticky-cta"><div class="container" style="max-width:520px">';
    if(isLast) h+='<button class="btn btn-primary btn-lg btn-block'+(ok?'':' disabled')+'" onclick="PQ.submit()"'+(ok?'':' disabled')+'>결과 확인하기</button>';
    else h+='<button class="btn btn-primary btn-lg btn-block'+(ok?'':' disabled')+'" onclick="PQ.next()"'+(ok?'':' disabled')+'>다음</button>';
    if(!isLast&&allOpt) h+='<div class="skip-link" onclick="PQ.next()">건너뛰기</div>';
    h+='</div></div>';
    $app.innerHTML=h;
  }

  function rQ(q,multi){
    var c=q.question_code,t=q.question_type,h='<div class="q-block">';
    // Show sub-title only for multi-question steps, avoid repeating step title
    if(multi&&q.title) h+='<div class="q-title">'+esc(q.title)+'</div>';
    if(multi&&q.description) h+='<div class="q-desc">'+esc(q.description)+'</div>';
    if(t==='SINGLE_SELECT'){
      var opts=getOpts(q.question_id||c),cv=STATE.answers[c]||'';
      h+='<div class="opts-grid">';
      opts.forEach(function(o){var s=cv===o.option_code;h+='<div class="opt-card'+(s?' selected':'')+'" onclick="PQ.sel(\''+c+'\',\''+o.option_code+'\')"><div class="opt-radio"></div><div><div class="opt-label">'+esc(o.option_label)+'</div>'+(o.option_description?'<div class="opt-desc">'+esc(o.option_description)+'</div>':'')+'</div></div>';});
      h+='</div>';
      if(cv==='OTHER'||cv==='OTHER_TEXT') h+='<input class="input" type="text" placeholder="직접 입력해주세요" value="'+esc(STATE.answers[c+'_OTHER_TEXT']||'')+'" oninput="PQ.txt(\''+c+'_OTHER_TEXT\',this.value)" style="margin-top:10px">';
    } else if(t==='MULTI_SELECT'){
      var opts=getOpts(q.question_id||c),ca=STATE.answers[c]||[];
      // Filter trade options based on space selection
      if(c==='R012_TRADES') opts=filterTradesBySpaces(opts);
      h+='<div class="opts-grid">';
      opts.forEach(function(o){var s=ca.indexOf(o.option_code)>=0;h+='<div class="opt-card'+(s?' selected':'')+'" onclick="PQ.tog(\''+c+'\',\''+o.option_code+'\')"><div class="opt-check"></div><div><div class="opt-label">'+esc(o.option_label)+'</div>'+(o.option_description?'<div class="opt-desc">'+esc(o.option_description)+'</div>':'')+'</div></div>';});
      h+='</div>';
      if(ca.indexOf('OTHER')>=0) h+='<input class="input" type="text" placeholder="직접 입력해주세요" value="'+esc(STATE.answers[c+'_OTHER_TEXT']||'')+'" oninput="PQ.txt(\''+c+'_OTHER_TEXT\',this.value)" style="margin-top:10px">';
    } else if(t==='SHORT_TEXT'){
      h+='<input class="input" type="text" placeholder="'+esc(q.placeholder||'')+'" value="'+esc(STATE.answers[c]||'')+'" oninput="PQ.txt(\''+c+'\',this.value)">';
    } else if(t==='LONG_TEXT'){
      h+='<textarea class="input textarea" placeholder="'+esc(q.placeholder||'')+'" oninput="PQ.txt(\''+c+'\',this.value)">'+esc(STATE.answers[c]||'')+'</textarea>';
    } else if(t==='PHONE'){
      h+='<input class="input" type="tel" placeholder="'+esc(q.placeholder||'010-0000-0000')+'" value="'+esc(STATE.answers[c]||'')+'" oninput="PQ.txt(\''+c+'\',this.value)">';
    } else if(t==='EMAIL'){
      h+='<input class="input" type="email" placeholder="'+esc(q.placeholder||'name@example.com')+'" value="'+esc(STATE.answers[c]||'')+'" oninput="PQ.txt(\''+c+'\',this.value)">';
    } else if(t==='FILE'){
      h+='<div class="file-zone" onclick="document.getElementById(\'f_'+c+'\').click()"><div style="font-size:28px;opacity:0.4;margin-bottom:6px">+</div><div style="color:var(--color-text-sub);font:var(--f-sm)">탭하여 사진 또는 파일을 선택하세요</div><input type="file" id="f_'+c+'" multiple accept="image/*,.pdf" style="display:none" onchange="PQ.addF(event)"></div>';
      if(STATE.files.length){h+='<div class="file-list">';STATE.files.forEach(function(f,i){h+='<div class="file-item"><span>'+esc(f.name)+'</span><span class="remove" onclick="PQ.rmF('+i+')">X</span></div>';});h+='</div>';}
    }
    if(q.helper_text) h+='<div style="margin-top:6px;font:var(--f-xs);color:var(--color-text-muted);line-height:1.5">'+esc(q.helper_text)+'</div>';
    h+='</div>';return h;
  }

  // ---- VALIDATION ----
  function chkReq(qs){return qs.every(function(q){if(String(q.is_required)!=='Y')return true;var v=STATE.answers[q.question_code];if(v===undefined||v===null)return false;if(typeof v==='string')return v.trim().length>0;if(Array.isArray(v))return v.length>0;return true;});}

  // ---- STEP BUILDER ----
  function buildSteps(){
    if(!CFG)return;
    var a=STATE.answers,pt=a.Q000_PROJECT_TYPE||'',fm=a.Q000_FLOW_MODE||'';
    var vis=getVisCodes(a);
    var allQ=(CFG.questions||[]).filter(function(q){return(vis.indexOf(q.question_code)>=0||isEntry(q.question_code))&&evalVis(q,a);});
    allQ.sort(function(a,b){return(Number(a.step_no)||0)-(Number(b.step_no)||0);});
    var s=[];
    if(!pt){pQ(s,allQ,'Q000_PROJECT_TYPE');STEPS=s;clampStep();return;}
    if(!fm){pQ(s,allQ,'Q000_FLOW_MODE');STEPS=s;clampStep();return;}
    if(fm==='PRESET'){
      var pk=pt==='RESIDENTIAL'?'Q000_PRESET_RESI':'Q000_PRESET_COMM';
      pQ(s,allQ,pk);pQ(s,allQ,'Q000_PRESET_TONE');s.push(mkContact(allQ));
      STEPS=flt(s);clampStep();return;
    }
    var det=fm==='DETAIL',core=allQ.filter(function(q){return!isEntry(q.question_code)&&!isCont(q.question_code);});
    if(pt==='RESIDENTIAL') bResi(s,core,det); else bComm(s,core,det);
    s.push(mkContact(allQ));
    STEPS=flt(s);clampStep();
  }

  function clampStep(){
    // If step count changed (e.g. entry->preset transition), reset to appropriate step
    var newCount=STEPS.length;
    if(newCount!==PREV_STEP_COUNT){
      if(STATE.step>=newCount) STATE.step=Math.max(0,newCount-1);
      PREV_STEP_COUNT=newCount;
    }
  }

  function bResi(s,q,det){
    pQ(s,q,'R001_HOUSING_TYPE');pQ(s,q,'R002_AREA');
    pG(s,q,['R003_CONDITION','R004_OCCUPANCY'],'현재 상태','집 상태와 거주 상태를 알려주세요.');
    if(det) pQ(s,q,'R005_REASON');
    pQ(s,q,'R010_SPACES');
    pQ(s,q,'R011_SCOPE_LEVEL');
    pQ(s,q,'R012_TRADES');
    if(det) pQ(s,q,'R013_STRUCTURE');
    pQ(s,q,'R100_DEMO_SCOPE');
    pG(s,q,['R110_BATH_SCOPE','R111_BATH_LEVEL'],'욕실 공사','욕실 공사 범위를 선택해주세요.');
    pQ(s,q,'R112_BATH_GRADE');
    pG(s,q,['R120_KITCHEN_SCOPE','R121_KITCHEN_LAYOUT'],'주방 공사','주방 공사 범위를 선택해주세요.');
    pQ(s,q,'R122_KITCHEN_GRADE');
    pG(s,q,['R130_FLOOR_SCOPE','R131_FLOOR_MATERIAL'],'바닥 공사','바닥 범위와 선호 소재를 선택해주세요.');
    pQ(s,q,'R132_FLOOR_GRADE');
    pQ(s,q,'R140_WINDOW_SCOPE');pQ(s,q,'R150_LIGHT_SCOPE');pQ(s,q,'R151_LIGHT_TYPE');pQ(s,q,'R160_BUILTIN_SCOPE');
    pG(s,q,['R200_STYLE','R201_TONE'],'분위기와 톤','원하시는 느낌을 선택해주세요.');
    pG(s,q,['R210_FAMILY','R211_PET'],'생활 정보','가족 구성과 반려동물을 알려주세요.');
    pQ(s,q,'R300_AGE');
    if(det) pQ(s,q,'R301_RISKS');
    pQ(s,q,'R302_MEP');
    pQ(s,q,'R310_BUDGET');
    pG(s,q,['R320_START','R321_END','R322_VISIT'],'일정','희망 시작/완료 시점을 알려주세요.');
  }

  function bComm(s,q,det){
    pQ(s,q,'C001_BIZ_TYPE');pQ(s,q,'C005_CUISINE_TYPE');pQ(s,q,'C002_AREA');
    pG(s,q,['C003_SITE_STATE','C004_OPERATION'],'공간 상태','현재 공간과 영업 상태를 알려주세요.');
    pQ(s,q,'C010_ZONES');
    pQ(s,q,'C011_SCOPE_LEVEL');
    pQ(s,q,'C012_TRADES');
    pQ(s,q,'C110_DEMO_SCOPE');pQ(s,q,'C120_KITCHEN_EXHAUST');pQ(s,q,'C130_RESTROOM_SCOPE');
    pQ(s,q,'C140_ELECTRICAL');pQ(s,q,'C150_HVAC');pQ(s,q,'C160_SIGNAGE');pQ(s,q,'C170_FIXTURE');
    if(det) pQ(s,q,'C180_PERMIT');
    pQ(s,q,'C200_BRAND_STYLE');
    pQ(s,q,'C300_BUDGET');
    pG(s,q,['C320_START','C321_END','C322_VISIT'],'일정','오픈/공사 희망 시점을 알려주세요.');
  }

  function pQ(s,q,c){var f=q.find(function(x){return x.question_code===c;});if(f)s.push({title:f.title||c,desc:f.description||'',questions:[f]});}
  function pG(s,q,cs,t,d){var f=cs.map(function(c){return q.find(function(x){return x.question_code===c;});}).filter(Boolean);if(f.length)s.push({title:t,desc:d||'',questions:f});}
  function mkContact(q){return{title:'연락처를 남겨주세요',desc:'상담 접수에 필요한 정보입니다.',questions:q.filter(function(x){return isCont(x.question_code);})};}
  function flt(s){return s.filter(function(x){return x.questions&&x.questions.length>0;});}
  function isEntry(c){return c==='Q000_PROJECT_TYPE'||c==='Q000_FLOW_MODE'||c==='Q000_PRESET_RESI'||c==='Q000_PRESET_COMM'||c==='Q000_PRESET_TONE';}
  function isCont(c){return c&&c.indexOf('Q90')===0;}
  function srt(a,b){return(Number(a.sort_order)||0)-(Number(b.sort_order)||0);}

  // ---- VISIBILITY ENGINE ----
  function getVisCodes(a){
    if(!CFG||!CFG.scopeMap)return[];
    var codes=new Set();
    (CFG.questions||[]).forEach(function(q){var sc=String(q.exposure_scope||'').toUpperCase();if(isEntry(q.question_code)||isCont(q.question_code)||sc==='COMMON'||sc==='GLOBAL')codes.add(q.question_code);});
    (CFG.scopeMap||[]).forEach(function(m){
      var tv=m.trigger_values_json||[],av=a[m.trigger_question_id];if(!av)return;
      var aa=Array.isArray(av)?av:[String(av)],hit=false;
      for(var i=0;i<tv.length;i++){if(aa.indexOf(tv[i])>=0){hit=true;break;}}
      if(hit)(m.target_question_ids_json||[]).forEach(function(t){codes.add(t);});
    });
    return Array.from(codes);
  }

  function evalVis(q,a){
    var e=String(q.visible_if_expr||'').trim();if(!e)return true;
    var parts=e.split(/\s*&&\s*/);
    for(var i=0;i<parts.length;i++){var p=parts[i].replace(/^\s*\(+\s*/,'').replace(/\s*\)+\s*$/,'').trim();if(p&&!evC(p,a))return false;}
    return true;
  }
  function evC(p,a){
    if(p.indexOf('||')>=0)return p.split(/\s*\|\|\s*/).some(function(x){return evC(x.replace(/^\s*\(+\s*/,'').replace(/\s*\)+\s*$/,'').trim(),a);});
    var m;
    if((m=p.match(/^(\w+)\s+includes\s+(\w+)$/))){var v=a[m[1]];if(!v)return false;return(Array.isArray(v)?v:[String(v)]).indexOf(m[2])>=0;}
    if((m=p.match(/^(\w+)\s+in\s+\[([^\]]*)\]$/))){var v=a[m[1]];if(!v)return false;return m[2].split(',').map(function(s){return s.trim();}).indexOf(String(v))>=0;}
    if((m=p.match(/^(\w+)\s*==\s*(\w+)$/)))return String(a[m[1]]||'')===m[2];
    if((m=p.match(/^(\w+)\s*!=\s*(\w+)$/)))return String(a[m[1]]||'')!==m[2];
    return true;
  }
  function getOpts(qid){if(!CFG||!CFG.options)return[];return CFG.options.filter(function(o){return o.question_id===qid;}).sort(srt);}

  // Space→Trade filter: hide trade options for spaces not selected
  var SPACE_TO_TRADE={BATH:['R_BATH'],KITCHEN:['R_KITCHEN']};
  var TRADE_TO_SPACE={R_BATH:'BATH',R_KITCHEN:'KITCHEN'};
  function filterTradesBySpaces(opts){
    var spaces=STATE.answers.R010_SPACES||[];
    if(!Array.isArray(spaces)||!spaces.length) return opts;
    // If ALL is selected, show everything
    if(spaces.indexOf('ALL')>=0) return opts;
    return opts.filter(function(o){
      var requiredSpace=TRADE_TO_SPACE[o.option_code];
      // If this trade requires a specific space, check if that space is selected
      if(requiredSpace) return spaces.indexOf(requiredSpace)>=0;
      // General trades (철거, 바닥, 샷시, 조명, 도배 등) always visible
      return true;
    });
  }

  function maxFileCount_(){return Math.max(Number(PS.file_upload_max_count||10),1);}
  function maxFileSizeBytes_(){return Math.max(Number(PS.file_upload_max_mb||20),1)*1024*1024;}
  function serializeFiles_(){
    return STATE.files.map(function(f,idx){
      return {
        file_name:f.name||'',
        file_mime:f.type||'',
        file_size:Number(f.size||0),
        upload_type:'CLIENT_METADATA_ONLY',
        sort_order:idx+1
      };
    });
  }

  // ---- ACTIONS ----
  window.PQ={
    start:function(){if(!CFG)return;STATE.screen='survey';STATE.step=0;STATE.answers={};PREV_STEP_COUNT=0;render();},
    sel:function(c,v){
      STATE.answers[c]=v;
      if(c.indexOf('Q000_PRESET')===0&&c!=='Q000_PRESET_TONE') applyBundle(v);
      var oldLen=STEPS.length;
      buildSteps();
      // Auto-advance only if step has 1 question AND steps didn't restructure
      var sd=STEPS[STATE.step];
      if(sd&&sd.questions.length===1&&STEPS.length===oldLen&&PS.auto_advance_single_select){
        setTimeout(function(){if(STATE.step<STEPS.length-1){STATE.step++;render();window.scrollTo(0,0);}else render();},PS.auto_advance_delay_ms||200);
      } else render();
    },
    tog:function(c,v){var a=STATE.answers[c]||[];if(!Array.isArray(a))a=[];var i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);STATE.answers[c]=[].concat(a);
      // If spaces changed, remove trades for deselected spaces
      if(c==='R010_SPACES'){
        var trades=STATE.answers.R012_TRADES||[];
        if(Array.isArray(trades)){
          var spaces=STATE.answers.R010_SPACES||[];
          var hasAll=spaces.indexOf('ALL')>=0;
          if(!hasAll){
            STATE.answers.R012_TRADES=trades.filter(function(t){
              var req=TRADE_TO_SPACE[t]; return !req||spaces.indexOf(req)>=0;
            });
          }
        }
      }
      render();},
    txt:function(c,v){STATE.answers[c]=v;updCta();},
    addF:function(e){
      var files=e.target.files||[];
      var maxCount=maxFileCount_();
      var maxBytes=maxFileSizeBytes_();
      for(var i=0;i<files.length;i++){
        var file=files[i];
        if(STATE.files.length>=maxCount){alert('첨부는 최대 '+maxCount+'개까지 가능합니다.');break;}
        if(Number(file.size||0)>maxBytes){alert(file.name+' 파일은 용량 제한을 초과했습니다.');continue;}
        STATE.files.push(file);
      }
      e.target.value='';
      render();
    },
    rmF:function(i){STATE.files.splice(i,1);render();},
    next:function(){if(STATE.step<STEPS.length-1){STATE.step++;render();window.scrollTo(0,0);}},
    prev:function(){
      if(STATE.step>0){STATE.step--;render();window.scrollTo(0,0);}
      else{var pt=STATE.answers.Q000_PROJECT_TYPE,fm=STATE.answers.Q000_FLOW_MODE;
        if(fm)delete STATE.answers.Q000_FLOW_MODE;else if(pt)delete STATE.answers.Q000_PROJECT_TYPE;else STATE.screen='landing';
        PREV_STEP_COUNT=0;render();}
    },
    submit:function(){
      STATE.screen='submitting';render();
      var a=Object.assign({},STATE.answers);
      var cf={name:a.Q900_NAME||'',phone:a.Q901_PHONE||'',email:a.Q902_EMAIL||'',method:a.Q903_CONTACT_METHOD||'KAKAO',note:a.Q904_NOTE||'',address:a.Q906_ADDRESS||''};
      google.script.run
        .withSuccessHandler(function(r){
          var url=APP_URL+'?page=result&id='+encodeURIComponent(r.request_id)+'&token='+encodeURIComponent(r.share_token);
          storeResultBootstrap_(r,a,cf);
          $app.innerHTML='<div class="container" style="padding-top:48px;text-align:center"><div class="fade-in">'
            +'<div style="width:64px;height:64px;border-radius:50%;background:var(--color-success-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 20px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-success)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
            +'<h2>'+esc(uiText('survey_submit_success_title','접수 완료'))+'</h2>'
            +'<p style="color:var(--color-text-sub);margin:12px 0 28px;line-height:1.6">'+esc(uiText('survey_submit_success_body','결과가 준비되었습니다.')).replace(/\n/g,'<br>')+'</p>'
            +'<a href="'+url+'" target="_top" class="btn btn-primary btn-lg btn-block" style="text-decoration:none;color:#fff;display:flex">결과 확인하기</a>'
            +'<p style="margin-top:16px;font:var(--f-xs);color:var(--color-text-muted)">버튼이 동작하지 않으면 아래 링크를 복사해주세요.</p>'
            +'<input class="input" readonly value="'+url+'" onclick="this.select()" style="font:var(--f-xs);margin-top:8px;text-align:center">'
            +'</div></div>';
          try{
            if(window.top&&window.top.location) window.top.location.replace(url);
            else window.location.replace(url);
          }catch(navErr){
            window.location.href=url;
          }
        })
        .withFailureHandler(function(e){STATE.screen='survey';render();alert('오류: '+(e.message||e));})
        .submitSurvey({answers:a,contact:cf,files:serializeFiles_()});
    }
  };

  function updCta(){var sd=STEPS[STATE.step];if(!sd)return;var ok=chkReq(sd.questions);document.querySelectorAll('.sticky-cta .btn').forEach(function(b){if(ok){b.removeAttribute('disabled');b.classList.remove('disabled');}else{b.setAttribute('disabled','');b.classList.add('disabled');}});}
  function applyBundle(bc){if(!CFG||!CFG.bundles)return;var b=CFG.bundles.find(function(x){return x.bundle_id===bc;});if(!b)return;var d=b.default_answers_json||{};for(var k in d){if(d.hasOwnProperty(k))STATE.answers[k]=d[k];}}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function showLoading(m){
    if(CFG) return;
    var e=document.getElementById('gl');
    if(!e){
      e=document.createElement('div');
      e.id='gl';
      e.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:999;pointer-events:none';
      document.body.appendChild(e);
    }
    e.innerHTML='<div style="max-width:520px;margin:0 auto;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,.94);box-shadow:0 10px 24px rgba(26,24,22,.12);font:var(--f-xs);color:var(--color-text-sub);display:flex;align-items:center;gap:8px"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div><div>'+(m||'')+'</div></div>';
  }
  function hideLoading(){var e=document.getElementById('gl');if(e)e.remove();}
  function showError(m){$app.innerHTML='<div class="container" style="padding-top:60px;text-align:center"><h2>오류</h2><p style="color:var(--color-text-sub);margin:12px 0">'+esc(m)+'</p><button class="btn btn-secondary" onclick="location.reload()">다시 시도</button></div>';}
  init();
})();
</script>
