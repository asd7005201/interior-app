<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <?!= include('styles') ?>
  <style>
    .result-shell{max-width:940px;margin:0 auto;padding:28px 20px 84px}
    .result-stage{display:grid;gap:18px}
    .hero-band{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(300px,.92fr);gap:18px}
    .card{background:rgba(255,255,255,.94);border:1px solid rgba(122,116,108,.14);border-radius:28px;box-shadow:0 18px 42px rgba(32,29,24,.08)}
    .hero-copy,.hero-range,.section-card{padding:24px}
    .hero-copy h1{font:700 42px/1.02 var(--ff);letter-spacing:-.03em;margin:14px 0 12px}
    .hero-copy p{font:var(--f-body);color:var(--color-text-sub);line-height:1.6}
    .hero-range{background:linear-gradient(135deg,#fffdf8,#f3ead8)}
    .hero-range strong{display:block;font:700 54px/1 var(--ff);margin:12px 0 14px}
    .eyebrow{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:rgba(47,107,94,.08);color:var(--color-primary);font:var(--f-xs);font-weight:700}
    .hero-meta{display:grid;gap:10px;margin-top:18px}
    .hero-meta .line{display:flex;justify-content:space-between;gap:12px;font:var(--f-sm)}
    .hero-meta .line span:last-child{color:var(--color-text-sub)}
    .hero-note{margin-top:18px;padding:14px 16px;border-radius:18px;border:1px solid rgba(47,107,94,.14);background:rgba(47,107,94,.05);color:var(--color-text-sub)}
    .flow-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .section-head .label{font:var(--f-xs);font-weight:700;letter-spacing:.08em;color:var(--color-primary)}
    .section-head h2{font:700 24px/1.1 var(--ff);margin-top:8px}
    .section-head p{font:var(--f-sm);color:var(--color-text-sub);max-width:320px}
    .section-step{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:999px;background:rgba(47,107,94,.08);color:var(--color-primary);font:700 14px/1 var(--ff)}
    .info-list,.flag-list,.rec-list,.answer-group{display:grid;gap:10px}
    .info-item,.flag-item,.rec-item,.answer-item{border:1px solid rgba(122,116,108,.12);border-radius:20px;background:#fff;padding:14px 16px}
    .info-item{display:grid;grid-template-columns:94px minmax(0,1fr);gap:12px}
    .info-key{font:var(--f-xs);font-weight:700;color:var(--color-text-sub);letter-spacing:.03em}
    .flag-item{display:flex;gap:10px;align-items:flex-start}
    .flag-dot{width:10px;height:10px;border-radius:999px;margin-top:6px;background:var(--color-warning)}
    .flag-item.high .flag-dot{background:var(--color-danger)}
    .rec-item{display:grid;grid-template-columns:72px minmax(0,1fr);gap:12px}
    .rec-thumb{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#ebe6dc,#d8d1c4) center/cover no-repeat}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chips .chip{background:rgba(122,116,108,.1);color:var(--color-warm-700)}
    .answer-group + .answer-group{margin-top:14px}
    .answer-group h3{font:700 16px/1.2 var(--ff)}
    .answer-item strong,.rec-item strong{display:block;font:700 16px/1.2 var(--ff)}
    .muted{color:var(--color-text-sub)}
    .empty{padding:18px 14px;border:1px dashed rgba(122,116,108,.16);border-radius:18px;background:rgba(255,255,255,.68);text-align:center;color:var(--color-text-sub)}
    .loading-card{padding:40px 24px;text-align:center}
    .loading-card .spinner{margin:0 auto 14px}
    @media (max-width:900px){
      .result-shell{padding:24px 16px 72px}
      .hero-band,.flow-grid{grid-template-columns:1fr}
      .hero-copy h1,.hero-range strong{font-size:34px}
    }
  </style>
</head>
<body>
<div id="resultApp" class="result-shell"></div>
<script>
(function(){
  var REQUEST_ID = <?!= JSON.stringify(request_id || "") ?>;
  var SHARE_TOKEN = <?!= JSON.stringify(share_token || "") ?>;
  var SETTINGS = <?!= settings_json || "{}" ?> || {};
  var UI_CONTENT = <?!= ui_content_json || "[]" ?> || [];
  var BOOTSTRAP_RESULT = <?!= bootstrap_result_json || "null" ?> || null;
  var RESULT_DATA_CACHE_KEY = "pq_result_data:" + REQUEST_ID + ":" + SHARE_TOKEN;
  var RESULT_BOOTSTRAP_KEY = "pq_result_bootstrap:" + REQUEST_ID + ":" + SHARE_TOKEN;
  var root = document.getElementById("resultApp");
  var currentData = null;

  function esc(v){ return String(v == null ? "" : v).replace(/[&<>"']/g, function(m){ return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[m]; }); }
  function num(v){ var n = Number(v); return isFinite(n) ? n : 0; }
  function formatRange(minV, maxV){ return Math.round(num(minV) / 10000).toLocaleString("ko-KR") + " ~ " + Math.round(num(maxV) / 10000).toLocaleString("ko-KR") + "만원"; }
  function formatDateTime(v){
    if (!v) return "-";
    var d = new Date(v);
    if (isNaN(d)) return String(v);
    return new Intl.DateTimeFormat("ko-KR", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" }).format(d);
  }
  function multiline(v){ return esc(v || "미입력").replace(/\n/g, "<br>"); }
  function chips(values){
    var list = Array.isArray(values) ? values.filter(Boolean) : [];
    if (!list.length) return '<span class="chip">미입력</span>';
    return list.map(function(value){ return '<span class="chip">' + esc(value) + '</span>'; }).join("");
  }
  function getUiCopy(key, fallback){
    var target = String(key || "").trim();
    for (var i = 0; i < UI_CONTENT.length; i++) {
      var row = UI_CONTENT[i] || {};
      if (String(row.content_key || "").trim() !== target) continue;
      return String(row.body || row.title || row.content_value || fallback || "").trim();
    }
    return String(fallback || "");
  }
  function readStorageJson(storage, key){
    try{
      if (!storage) return null;
      var raw = storage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }
  function writeStorageJson(storage, key, value){
    try{
      if (storage) storage.setItem(key, JSON.stringify(value || null));
    }catch(e){}
  }
  function consumeBootstrapResult(){
    var sessionValue = readStorageJson(window.sessionStorage, RESULT_BOOTSTRAP_KEY);
    if (sessionValue) {
      try { window.sessionStorage.removeItem(RESULT_BOOTSTRAP_KEY); } catch (e0) {}
      return sessionValue;
    }
    return BOOTSTRAP_RESULT || null;
  }
  function readCachedResultData(){ return readStorageJson(window.localStorage, RESULT_DATA_CACHE_KEY); }
  function persistResultData(data){
    if (!data || data._bootstrap) return;
    writeStorageJson(window.localStorage, RESULT_DATA_CACHE_KEY, data);
  }
  function showLoading(message){
    root.innerHTML = '<div class="card loading-card"><div class="spinner"></div><p class="muted">' + esc(message || getUiCopy("result_loading_notice", "가견적 결과를 불러오는 중입니다.")) + '</p></div>';
  }
  function showError(message){
    root.innerHTML = '<div class="card section-card" style="text-align:center"><h2 style="margin-bottom:10px">결과를 불러오지 못했습니다.</h2><p class="muted">' + esc(message || "잠시 후 다시 시도해주세요.") + '</p></div>';
  }
  function buildInfoRow(key, value){
    return '<div class="info-item"><div class="info-key">' + esc(key) + '</div><div>' + multiline(value || "미입력") + '</div></div>';
  }
  function renderFlags(flags){
    var list = Array.isArray(flags) ? flags : [];
    if (!list.length) return '<div class="empty">추가 확인이 필요한 항목이 없습니다.</div>';
    return '<div class="flag-list">' + list.map(function(flag){
      var high = String(flag.severity || "").toLowerCase() === "high";
      return '<div class="flag-item' + (high ? ' high' : '') + '"><span class="flag-dot"></span><div><strong>' + esc(flag.severity_label || flag.severity || "참고") + '</strong><div class="muted" style="margin-top:4px">' + esc(flag.label || flag.flag || "") + '</div></div></div>';
    }).join("") + '</div>';
  }
  function renderAnswers(groups){
    var list = Array.isArray(groups) ? groups : [];
    if (!list.length) return '<div class="empty">설문 응답을 정리하는 중입니다.</div>';
    return list.map(function(group){
      return '<div class="answer-group"><h3>' + esc(group.group_label || group.group_key || "응답") + '</h3>' +
        (group.items || []).map(function(item){
          var values = item.answer_display_values || [];
          var body = values.length > 1 ? '<div class="chips">' + chips(values) + '</div>' : '<div>' + multiline(item.answer_display_text || "미입력") + '</div>';
          return '<div class="answer-item"><strong>' + esc(item.question_label || item.question_code || "-") + '</strong>' + body + '</div>';
        }).join("") +
      '</div>';
    }).join("");
  }
  function renderRecommendations(recs, status){
    var list = Array.isArray(recs) ? recs : [];
    var state = String(status || "").trim().toUpperCase();
    if (state === "PENDING") return '<div class="empty">추천 자재를 준비하는 중입니다.</div>';
    if (!list.length) return '<div class="empty">표시할 추천 자재가 없습니다.</div>';
    return '<div class="rec-list">' + list.map(function(item){
      var thumb = item.image_url ? ' style="background-image:url(\'' + esc(item.image_url).replace(/'/g, '&#39;') + '\')"' : '';
      return '<div class="rec-item"><div class="rec-thumb"' + thumb + '></div><div><strong>' + esc(item.title || item.material_id || "추천 자재") + '</strong><div class="muted" style="margin-top:4px">' + esc([item.brand, item.spec, item.subtitle].filter(Boolean).join(" / ") || "정보 준비 중") + '</div><div class="muted" style="margin-top:8px">' + esc(item.reason_text || "조건과 가까운 자재를 먼저 추천했습니다.") + '</div></div></div>';
    }).join("") + '</div>';
  }
  function renderPage(data){
    var req = (data && data.request) || {};
    var est = (data && data.estimate) || {};
    var flags = (data && data.flags) || [];
    var answers = (data && data.answer_groups) || [];
    var recs = (data && data.recommendations) || [];
    var notice = (data && data.notice_text) || "입력하신 조건을 기준으로 참고 범위를 먼저 보여드립니다. 최종 금액은 상담 후 다시 안내됩니다.";
    root.innerHTML = '' +
      '<div class="result-stage">' +
        '<section class="hero-band fade-in">' +
          '<div class="card hero-copy">' +
            '<span class="eyebrow">가견적 결과</span>' +
            '<h1>먼저 금액 범위를 확인하세요</h1>' +
            '<p>결과 요약을 먼저 보여드리고, 상세 응답과 추천 자재는 뒤에서 이어서 정리합니다.</p>' +
            '<div class="hero-note">' + multiline(notice) + '</div>' +
          '</div>' +
          '<div class="card hero-range">' +
            '<span class="eyebrow">현재 참고 범위</span>' +
            '<strong>' + esc(formatRange(est.min || 0, est.max || 0)) + '</strong>' +
            '<div class="hero-meta">' +
              '<div class="line"><span>고객명</span><span>' + esc(req.customer_name || "고객") + '</span></div>' +
              '<div class="line"><span>접수 시각</span><span>' + esc(formatDateTime(req.created_at)) + '</span></div>' +
              '<div class="line"><span>프로젝트</span><span>' + esc([req.project_type_label, req.housing_type_label].filter(Boolean).join(" / ") || "-") + '</span></div>' +
            '</div>' +
          '</div>' +
        '</section>' +
        '<div class="flow-grid fade-in">' +
          '<section class="card section-card"><div class="section-head"><div><div class="label">STEP 1</div><h2>접수 요약</h2><p>입력하신 기본 정보를 먼저 정리했습니다.</p></div><span class="section-step">1</span></div><div class="info-list">' +
            buildInfoRow("프로젝트", [req.project_type_label, req.housing_type_label].filter(Boolean).join(" / ")) +
            buildInfoRow("면적/범위", [req.area_label, req.scope_level_label].filter(Boolean).join(" / ")) +
            buildInfoRow("진행 방식", req.flow_mode_label) +
            buildInfoRow("희망 일정", [req.schedule_start_label || "미정", req.schedule_end_label || "미정"].join(" ~ ")) +
            buildInfoRow("주소", req.address_label) +
            buildInfoRow("요청 메모", req.customer_note_label || "없음") +
          '</div></section>' +
          '<section class="card section-card"><div class="section-head"><div><div class="label">STEP 2</div><h2>체크 포인트</h2><p>추가 확인이 필요한 내용입니다.</p></div><span class="section-step">2</span></div>' + renderFlags(flags) + '</section>' +
          '<section class="card section-card"><div class="section-head"><div><div class="label">STEP 3</div><h2>추천 자재</h2><p>저장된 추천을 먼저 보여줍니다.</p></div><span class="section-step">3</span></div>' + renderRecommendations(recs, data && data.recommendation_status) + '</section>' +
          '<section class="card section-card"><div class="section-head"><div><div class="label">STEP 4</div><h2>설문 응답</h2><p>입력한 내용을 다시 확인할 수 있습니다.</p></div><span class="section-step">4</span></div>' + renderAnswers(answers) + '</section>' +
        '</div>' +
      '</div>';
  }
  function hydrateRecommendations(){
    google.script.run
      .withSuccessHandler(function(res){
        if (!currentData) return;
        currentData.recommendations = (res && res.recommendations) || [];
        currentData.recommendation_status = "READY";
        renderPage(currentData);
      })
      .withFailureHandler(function(){})
      .getResultRecommendations(REQUEST_ID, SHARE_TOKEN);
  }
  function render(data){
    currentData = data || {};
    persistResultData(currentData);
    renderPage(currentData);
    if (!currentData._bootstrap && String(currentData.recommendation_status || "").toUpperCase() === "PENDING") {
      setTimeout(hydrateRecommendations, 120);
    }
  }
  function requestResultData(){
    google.script.run
      .withSuccessHandler(function(data){ render(data); })
      .withFailureHandler(function(err){
        if (!currentData) showError(err && err.message ? err.message : "결과를 불러오지 못했습니다.");
      })
      .getResultData(REQUEST_ID, SHARE_TOKEN);
  }
  function init(){
    if (!REQUEST_ID || !SHARE_TOKEN) {
      showError("유효한 결과 링크가 아닙니다.");
      return;
    }
    var initialData = consumeBootstrapResult() || readCachedResultData();
    if (initialData) {
      render(initialData);
      setTimeout(requestResultData, 80);
      return;
    }
    showLoading(getUiCopy("result_loading_notice", "가견적 결과를 불러오는 중입니다."));
    requestResultData();
  }
  init();
})();
</script>
</body>
</html>
