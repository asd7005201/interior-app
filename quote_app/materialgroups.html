<script>
(function(){
  var rowsState = [];
  var pickingRowIndex = -1;
  var hasSearchResultLoaded = false;
  var rowsLoadReqSeq = 0;
  var pickerSearchReqSeq = 0;
  var statusTimer = 0;

  var MAPPING_ROLE_OPTIONS = [
    { value: "LEGACY_MAPPING", label: "일반 매핑" },
    { value: "LEGACY_REPRESENTATIVE", label: "대표 매핑" }
  ];
  var SPACE_TYPE_OPTIONS = [
    { value: "BOTH", label: "전체" },
    { value: "RESIDENTIAL", label: "주거공간" },
    { value: "COMMERCIAL", label: "상업공간" }
  ];
  var ACTIVE_OPTIONS = [
    { value: "Y", label: "사용" },
    { value: "N", label: "미사용" }
  ];
  var EXPOSE_OPTIONS = [
    { value: "Y", label: "노출" },
    { value: "N", label: "비노출" }
  ];

  function $(id){ return document.getElementById(id); }
  function setStatus(msg, tone, timeoutMs){
    var el = $("status");
    if (!el) return;
    if (statusTimer) {
      clearTimeout(statusTimer);
      statusTimer = 0;
    }
    var text = String(msg || "").trim();
    el.innerText = text;
    el.style.display = text ? "" : "none";
    el.style.color = tone === "error" ? "#c5221f" : (tone === "success" ? "#18794e" : "");
    if (text && timeoutMs) {
      statusTimer = setTimeout(function(){
        el.innerText = "";
        el.style.display = "none";
        el.style.color = "";
        statusTimer = 0;
      }, timeoutMs);
    }
  }
  function toast(msg, type){
    if (!msg || !window.AppUI) return;
    window.AppUI.toast(msg, { type: type || "", position: "bottom" });
  }
  function esc(s){
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
  function getErrMessage(err){
    return (err && err.message) ? String(err.message) : String(err || "");
  }
  function openLayerFallback(host){
    if (!host) return;
    host.style.display = "flex";
    host.classList.add("is-open");
    host.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }
  function closeLayerFallback(host){
    if (!host) return;
    host.style.display = "none";
    host.classList.remove("is-open");
    host.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  var APP_URL = "<?= String(U || '') ?>";
  var SERVER_PREFILL_ADMIN_PW = decodeURIComponent("<?= encodeURIComponent(String(PREFILL_ADMIN_PW || '')) ?>");
  var PW_KEY = "QUOTEAPP_ADMINPW_V1";

  var adminCtx = (window.AppShared && typeof window.AppShared.createAdminContext === "function")
    ? window.AppShared.createAdminContext({
        appUrl: APP_URL,
        prefillAdminPw: SERVER_PREFILL_ADMIN_PW,
        pwKey: PW_KEY,
        adminInputId: "adminPw",
        setStatus: setStatus
      })
    : null;
  if (adminCtx && adminCtx.appUrl) APP_URL = adminCtx.appUrl;

  function normalizeBaseUrl(u){ return adminCtx ? adminCtx.normalizeBaseUrl(u) : String(u || "").trim(); }
  function resolveAppUrl(){ return adminCtx ? adminCtx.resolveAppUrl(APP_URL) : APP_URL; }
  APP_URL = resolveAppUrl();

  function patchNavLinks(){ if (adminCtx) adminCtx.patchNavLinks(); }

  function initBentoNav(){
    var btn = $("btnBentoNav");
    var menu = $("bentoNavMenu");
    if (!btn || !menu) return;

    function closeMenu(){
      menu.classList.remove("open");
      btn.setAttribute("aria-expanded", "false");
    }
    function toggleMenu(){
      var open = menu.classList.toggle("open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
    }

    btn.addEventListener("click", function(e){
      e.preventDefault();
      e.stopPropagation();
      toggleMenu();
    });
    document.addEventListener("click", function(e){
      if (!menu.classList.contains("open")) return;
      if (menu.contains(e.target) || btn.contains(e.target)) return;
      closeMenu();
    });
    document.addEventListener("keydown", function(e){
      if (e.key === "Escape") closeMenu();
    });
    var links = menu.querySelectorAll("a[data-page]");
    for (var i = 0; i < links.length; i++) links[i].addEventListener("click", closeMenu);
  }

  function handleAdminSessionExpired(err){ return adminCtx ? adminCtx.handleAdminSessionExpired(err) : false; }
  function pw(){ return adminCtx ? adminCtx.pw() : String(($("adminPw") && $("adminPw").value) || "").trim(); }
  function stripSensitiveQueryParams(){ if (adminCtx) adminCtx.stripSensitiveQueryParams(); }
  function restorePw(){ if (adminCtx) adminCtx.restorePw(); }
  function maybeUpgradeToSessionToken(onDone){
    if (adminCtx) return adminCtx.maybeUpgradeToSessionToken(onDone);
    if (typeof onDone === "function") onDone();
  }
  function clearPw(silent){ if (adminCtx) return adminCtx.clearPw(silent); }

  function buildOptionsHtml(options, selectedValue){
    var normalized = String(selectedValue || "").trim().toUpperCase();
    var list = Array.isArray(options) ? options : [];
    var out = [];
    for (var i = 0; i < list.length; i++) {
      var opt = list[i];
      var value = String(opt.value || "").trim().toUpperCase();
      out.push(
        '<option value="' + esc(value) + '"' + (value === normalized ? " selected" : "") + '>' + esc(opt.label || value) + '</option>'
      );
    }
    return out.join("");
  }

  function imgPublicUrl(fileId){
    if (!fileId) return "";
    return APP_URL + "?page=img&fileId=" + encodeURIComponent(fileId);
  }
  function imgDriveFallbackUrl(fileId){
    if (!fileId) return "";
    return "https://drive.google.com/thumbnail?id=" + encodeURIComponent(fileId) + "&sz=w300";
  }
  function applyImageSource(img, fileId){
    if (!img) return;
    if (window.AppShared && typeof window.AppShared.applyImageSource === "function") {
      window.AppShared.applyImageSource(img, fileId, { appUrl: APP_URL, size: 300, lazy: true, page: "img" });
      return;
    }
    if (!fileId) return;
    img.src = imgPublicUrl(fileId);
    img.onerror = function(){
      if (img.dataset.fallbackApplied) return;
      img.dataset.fallbackApplied = "1";
      img.src = imgDriveFallbackUrl(fileId);
    };
  }

  function numberOrZero(value){
    var n = Number(value);
    return isFinite(n) ? n : 0;
  }

  function syncStatusMeta(status){
    var code = String(status || "").trim().toUpperCase();
    if (code === "SYNCED") return { label: "동기화 완료", detail: "태그가 반영됐어요.", style: "background:#e8f7ee;color:#18794e;border:1px solid #b6e3c8;" };
    if (code === "SYNC_ERROR") return { label: "동기화 오류", detail: "다시 저장해 주세요.", style: "background:#fff1f0;color:#c5221f;border:1px solid #f5b5b2;" };
    if (code === "SYNC_MISMATCH") return { label: "확인 필요", detail: "태그를 다시 확인해 주세요.", style: "background:#fff7e6;color:#ad6800;border:1px solid #ffd591;" };
    if (code === "INACTIVE") return { label: "미사용", detail: "동기화 대상이 아니에요.", style: "background:#f3f4f6;color:#5f6368;border:1px solid #d0d7de;" };
    return { label: "태그 없음", detail: "저장하면 자동 반영돼요.", style: "background:#f5f6f7;color:#5f6368;border:1px solid #d0d7de;" };
  }

  function buildSyncBadgeHtml(row){
    var meta = syncStatusMeta(row && row.sync_status);
    var actual = numberOrZero(row && row.derived_tag_count);
    var parts = [
      '<span class="badge" style="' + meta.style + '">' + esc(meta.label) + '</span>'
    ];
    if (String((row && row.sync_status) || "").trim().toUpperCase() === "SYNCED") {
      parts.push('<div class="help-text" style="margin-top:6px;">태그 ' + esc(actual) + '개 반영됨</div>');
    } else {
      parts.push('<div class="help-text" style="margin-top:6px;">' + esc(meta.detail) + '</div>');
    }
    return parts.join("");
  }

  function buildSaveResultMeta(saved){
    var sync = saved && saved.sync ? saved.sync : null;
    if (sync && sync.ok === false) {
      return {
        statusText: "저장됐지만 태그 동기화에 실패했어요.",
        statusTone: "error",
        toastText: "저장됨, 태그 동기화 실패",
        toastType: "error"
      };
    }
    if (sync && sync.ok) {
      if (String((saved && saved.is_active) || "Y").toUpperCase() !== "Y") {
        return {
          statusText: "태그 정리를 마쳤어요.",
          statusTone: "success",
          toastText: "태그 정리 완료 (" + numberOrZero(sync.removed_count) + "개)",
          toastType: "success"
        };
      }
      return {
        statusText: "동기화를 마쳤어요.",
        statusTone: "success",
        toastText: "동기화 완료 (" + numberOrZero(sync.upserted_count) + "개 태그)",
        toastType: "success"
      };
    }
    return {
      statusText: "저장했어요.",
      statusTone: "success",
      toastText: "저장했어요.",
      toastType: "success"
    };
  }

  function buildDeleteResultMeta(result){
    var sync = result && result.sync ? result.sync : null;
    if (sync && sync.ok === false) {
      return {
        statusText: "삭제됐지만 태그 정리에 실패했어요.",
        statusTone: "error",
        toastText: "삭제됨, 태그 정리 실패",
        toastType: "error"
      };
    }
    if (sync && sync.ok) {
      return {
        statusText: "삭제를 마쳤어요.",
        statusTone: "success",
        toastText: "삭제 완료 (" + numberOrZero(sync.deleted_count || sync.removed_count) + "개 정리)",
        toastType: "success"
      };
    }
    return {
      statusText: "삭제했어요.",
      statusTone: "success",
      toastText: "삭제했어요.",
      toastType: "success"
    };
  }

  function defaultRow(){
    return {
      group_key: "",
      original_group_key: "",
      group_label_ko: "",
      mapping_role: "LEGACY_MAPPING",
      space_type: "BOTH",
      trade_code: "",
      material_id: "",
      expose_to_prequote: "N",
      sort_order: 0,
      recommendation_note: "",
      note: "",
      is_active: "Y",
      material_preview: null,
      derived_tag_count: 0,
      expected_derived_tag_count: 0,
      sync_status: "TAGS_NONE"
    };
  }

  function syncRowsStateFromDom(){
    var body = $("rows");
    if (!body) return;
    var trs = body.querySelectorAll("tr");
    var limit = Math.min(rowsState.length, trs.length);
    for (var i = 0; i < limit; i++){
      var tr = trs[i];
      if (!tr || !tr.querySelector(".inputGroupKey")) continue;
      var cur = rowsState[i] || defaultRow();
      rowsState[i] = {
        group_key: String(tr.querySelector(".inputGroupKey").value || "").trim(),
        original_group_key: String(cur.original_group_key || cur.group_key || "").trim(),
        group_label_ko: String(tr.querySelector(".inputGroupLabel").value || "").trim(),
        mapping_role: String(tr.querySelector(".inputMappingRole").value || "LEGACY_MAPPING").trim().toUpperCase(),
        space_type: String(tr.querySelector(".inputSpaceType").value || "BOTH").trim().toUpperCase(),
        trade_code: String(tr.querySelector(".inputTradeCode").value || "").trim(),
        material_id: String(cur.material_id || "").trim(),
        expose_to_prequote: String(tr.querySelector(".inputExposePrequote").value || "N").trim().toUpperCase(),
        sort_order: numberOrZero(tr.querySelector(".inputSortOrder").value || 0),
        recommendation_note: String(tr.querySelector(".inputRecommendationNote").value || "").trim(),
        note: String(tr.querySelector(".inputNote").value || "").trim(),
        is_active: String(tr.querySelector(".inputActive").value || "Y").trim().toUpperCase(),
        material_preview: cur.material_preview || null,
        derived_tag_count: numberOrZero(cur.derived_tag_count),
        expected_derived_tag_count: numberOrZero(cur.expected_derived_tag_count),
        sync_status: String(cur.sync_status || "TAGS_NONE")
      };
    }
  }

  function renderRows(){
    var body = $("rows");
    body.innerHTML = "";

    if (!rowsState.length){
      var emptyMsg = hasSearchResultLoaded
        ? "검색 결과가 없어요."
        : "조회 버튼을 누르면 전체 목록을 볼 수 있어요.";
      body.innerHTML = '<tr><td colspan="10"><div class="help-text">' + esc(emptyMsg) + '</div></td></tr>';
      $("countMeta").innerText = "0건";
      return;
    }

    $("countMeta").innerText = Number(rowsState.length).toLocaleString("ko-KR") + "건";

    var frag = document.createDocumentFragment();
    for (var i = 0; i < rowsState.length; i++){
      (function(idx){
        var row = rowsState[idx] || defaultRow();
        var tr = document.createElement("tr");
        var syncHtml = buildSyncBadgeHtml(row);
        var mappingRole = String(row.mapping_role || "LEGACY_MAPPING").toUpperCase();
        var spaceType = String(row.space_type || "BOTH").toUpperCase();
        var isActive = String(row.is_active || "Y").toUpperCase();
        var exposeToPrequote = String(row.expose_to_prequote || "N").toUpperCase();

        var preview = row.material_preview || null;
        var previewHtml = "";
        if (preview) {
          var previewFlags = [];
          if (preview.is_representative) previewFlags.push("대표");
          if (preview.expose_to_prequote) previewFlags.push("가견적");
          if (!preview.is_active) previewFlags.push("비활성");
          previewHtml =
            '<div style="display:flex;align-items:center;gap:8px;">' +
              '<div class="previewImgWrap" data-row="' + idx + '"></div>' +
              '<div>' +
                '<div style="font-weight:600;">' + esc((preview.brand ? (preview.brand + " ") : "") + (preview.name || "")) + '</div>' +
                '<div class="help-text">ID ' + esc(preview.material_id || row.material_id || "") + '</div>' +
                '<div class="help-text">\uADDC\uACA9 ' + esc(preview.spec || "-") + ' | \uB2E8\uC704 ' + esc(preview.unit || "-") + ' | \uB2E8\uAC00 ' + Number(preview.unit_price || 0).toLocaleString("ko-KR") + '\uC6D0</div>' +
                (previewFlags.length ? ('<div class="help-text">' + esc(previewFlags.join(" · ")) + '</div>') : '') +
              '</div>' +
            '</div>';
        } else if (row.material_id) {
          previewHtml = '<div class="help-text">\uC120\uD0DD\uB41C ID: ' + esc(row.material_id) + '</div>';
        } else {
          previewHtml = '<div class="help-text">\uC790\uC7AC\uB97C \uC120\uD0DD\uD574\uC694.</div>';
        }

        tr.innerHTML =
          '<td><input class="inputGroupKey" value="' + esc(row.group_key || '') + '" placeholder="예: FLOOR_LIGHTWOOD"></td>' +
          '<td><input class="inputGroupLabel" value="' + esc(row.group_label_ko || '') + '" placeholder="예: 거실 우드 바닥"></td>' +
          '<td>' +
            '<select class="inputMappingRole">' + buildOptionsHtml(MAPPING_ROLE_OPTIONS, mappingRole) + '</select>' +
          '</td>' +
          '<td>' +
            '<select class="inputSpaceType">' + buildOptionsHtml(SPACE_TYPE_OPTIONS, spaceType) + '</select>' +
          '</td>' +
          '<td><input class="inputTradeCode" value="' + esc(row.trade_code || '') + '" placeholder="예: FLOOR"></td>' +
          '<td>' +
            syncHtml +
          '</td>' +
          '<td>' +
            '<div style="display:grid;gap:6px;min-width:200px;">' +
              '<label class="help-text" style="display:flex;align-items:center;gap:8px;">사용 여부 ' +
                '<select class="inputActive" style="margin-left:auto;max-width:104px;">' + buildOptionsHtml(ACTIVE_OPTIONS, isActive) + '</select>' +
              '</label>' +
              '<label class="help-text" style="display:flex;align-items:center;gap:8px;">가견적 노출 ' +
                '<select class="inputExposePrequote" style="margin-left:auto;max-width:104px;">' + buildOptionsHtml(EXPOSE_OPTIONS, exposeToPrequote) + '</select>' +
              '</label>' +
              '<label class="help-text" style="display:flex;align-items:center;gap:8px;">정렬 순서 ' +
                '<input class="inputSortOrder" type="number" step="1" value="' + esc(numberOrZero(row.sort_order)) + '" style="margin-left:auto;max-width:96px;">' +
              '</label>' +
            '</div>' +
          '</td>' +
          '<td>' +
            previewHtml +
            '<div style="display:flex;gap:6px;margin-top:6px;">' +
              '<button type="button" class="btn btn--weak btn--sm btnPickMaterial">자재 선택</button>' +
            '</div>' +
          '</td>' +
          '<td>' +
            '<div style="display:grid;gap:6px;min-width:220px;">' +
              '<input class="inputRecommendationNote" value="' + esc(row.recommendation_note || '') + '" placeholder="추천 메모">' +
              '<input class="inputNote" value="' + esc(row.note || '') + '" placeholder="운영 메모">' +
            '</div>' +
          '</td>' +
          '<td>' +
            '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
              '<button type="button" class="btn btn--primary btn--sm btnSaveRow">\uC800\uC7A5</button>' +
              '<button type="button" class="btn btn--weak btn--sm danger btnDeleteRow">\uC0AD\uC81C</button>' +
            '</div>' +
          '</td>';

        frag.appendChild(tr);

        if (preview && preview.image_file_id) {
          var wrap = tr.querySelector(".previewImgWrap");
          if (wrap) {
            var img = document.createElement("img");
            img.className = "thumb";
            img.alt = "자재 미리보기";
            applyImageSource(img, preview.image_file_id);
            wrap.appendChild(img);
          }
        }

        tr.querySelector(".btnPickMaterial").addEventListener("click", function(){
          syncRowsStateFromDom();
          pickingRowIndex = idx;
          openPicker();
        });

        tr.querySelector(".btnSaveRow").addEventListener("click", function(){
          var payload = collectRowPayload(tr, idx);
          saveRow(idx, payload, this);
        });

        tr.querySelector(".btnDeleteRow").addEventListener("click", function(){
          deleteRow(idx, tr.querySelector(".inputGroupKey").value, this);
        });
      })(i);
    }
    body.appendChild(frag);
  }

  function collectRowPayload(tr, idx){
    var row = rowsState[idx] || defaultRow();
    return {
      group_key: String(tr.querySelector(".inputGroupKey").value || "").trim(),
      original_group_key: String(row.original_group_key || row.group_key || "").trim(),
      group_label_ko: String(tr.querySelector(".inputGroupLabel").value || "").trim(),
      mapping_role: String(tr.querySelector(".inputMappingRole").value || "LEGACY_MAPPING").trim().toUpperCase(),
      space_type: String(tr.querySelector(".inputSpaceType").value || "BOTH").trim().toUpperCase(),
      trade_code: String(tr.querySelector(".inputTradeCode").value || "").trim(),
      material_id: String((row && row.material_id) || "").trim(),
      expose_to_prequote: String(tr.querySelector(".inputExposePrequote").value || "N").trim().toUpperCase(),
      sort_order: numberOrZero(tr.querySelector(".inputSortOrder").value || 0),
      recommendation_note: String(tr.querySelector(".inputRecommendationNote").value || "").trim(),
      note: String(tr.querySelector(".inputNote").value || "").trim(),
      is_active: String(tr.querySelector(".inputActive").value || "Y").trim().toUpperCase()
    };
  }

  function runWithLoading(btn, fn){
    if (!btn) return fn(function(){});
    var doneCalled = false;
    var watchdog = null;
    btn.disabled = true;
    btn.classList.add("loading");
    btn.classList.add("is-loading");
    watchdog = setTimeout(function(){ done(); }, 45000);
    function done(){
      if (doneCalled) return;
      doneCalled = true;
      if (watchdog) {
        clearTimeout(watchdog);
        watchdog = null;
      }
      btn.disabled = false;
      btn.classList.remove("loading");
      btn.classList.remove("is-loading");
    }
    try { fn(done); } catch (e) { done(); throw e; }
  }

  function currentFilters(){
    return {
      query: String(($("filterQuery") && $("filterQuery").value) || "").trim(),
      space_type: String(($("filterSpaceType") && $("filterSpaceType").value) || "").trim(),
      trade_code: String(($("filterTradeCode") && $("filterTradeCode").value) || "").trim(),
      expose_to_prequote: String(($("filterExpose") && $("filterExpose").value) || "").trim(),
      is_active: String(($("filterActive") && $("filterActive").value) || "").trim(),
      include_inactive: !!(($("filterIncludeInactive") && $("filterIncludeInactive").checked))
    };
  }

  function isAllQueryKeyword_(q){
    var s = String(q || "").trim().toLowerCase();
    return s === "all" || s === "*" || s === "전체";
  }

  function loadRows(btn){
    var filters = currentFilters();
    var allKeyword = isAllQueryKeyword_(filters.query);
    if (allKeyword) filters.query = "";

    var reqId = ++rowsLoadReqSeq;
    runWithLoading(btn, function(done){
      google.script.run
        .withSuccessHandler(function(list){
          done();
          if (reqId !== rowsLoadReqSeq) return;
          rowsState = Array.isArray(list) ? list : [];
          hasSearchResultLoaded = true;
          renderRows();
          setStatus("", "", 0);
        })
        .withFailureHandler(function(err){
          done();
          if (reqId !== rowsLoadReqSeq) return;
          if (handleAdminSessionExpired(err)) return;
          setStatus("목록을 불러오지 못했어요.", "error", 3200);
          toast("목록 조회에 실패했어요.", "error");
        })
        .listMaterialGroupsAdmin(filters, pw());
    });
  }

  function saveRow(idx, payload, btn){
    if (!payload.group_key) {
      setStatus("매핑 키를 입력해 주세요.", "error", 2600);
      toast("매핑 키가 필요해요.", "error");
      return;
    }
    if (!payload.material_id) {
      setStatus("연결할 자재를 선택해 주세요.", "error", 2600);
      toast("자재 선택이 필요해요.", "error");
      return;
    }

    runWithLoading(btn, function(done){
      google.script.run
        .withSuccessHandler(function(saved){
          done();
          rowsState[idx] = saved || payload;
          renderRows();
          var meta = buildSaveResultMeta(saved || {});
          setStatus(meta.statusText, meta.statusTone, 2200);
          toast(meta.toastText, meta.toastType);
        })
        .withFailureHandler(function(err){
          done();
          if (handleAdminSessionExpired(err)) return;
          setStatus("저장하지 못했어요.", "error", 3200);
          toast("저장에 실패했어요.", "error");
        })
        .upsertMaterialGroupAdmin(payload, pw());
    });
  }

  function deleteRow(idx, groupKeyRaw, btn){
    var key = String(groupKeyRaw || "").trim();
    if (!confirm("이 행을 삭제할까요?")) return;

    if (!key) {
      rowsState.splice(idx, 1);
      renderRows();
      setStatus("", "", 0);
      return;
    }

    runWithLoading(btn, function(done){
      google.script.run
        .withSuccessHandler(function(result){
          done();
          rowsState.splice(idx, 1);
          renderRows();
          var meta = buildDeleteResultMeta(result || {});
          setStatus(meta.statusText, meta.statusTone, 2200);
          toast(meta.toastText, meta.toastType);
        })
        .withFailureHandler(function(err){
          done();
          if (handleAdminSessionExpired(err)) return;
          setStatus("삭제하지 못했어요.", "error", 3200);
          toast("삭제에 실패했어요.", "error");
        })
        .deleteMaterialGroupAdmin(key, pw());
    });
  }

  function openPicker(){
    $("pickerQuery").value = "";
    $("pickerResults").innerHTML = "";
    $("pickerResultMeta").innerText = "검색어를 입력해요.";
    if (window.AppUI && typeof window.AppUI.openModal === "function") {
      window.AppUI.openModal($("pickerModal"));
      return;
    }
    openLayerFallback($("pickerModal"));
  }
  function closePicker(){
    if (window.AppUI && typeof window.AppUI.closeModal === "function") {
      window.AppUI.closeModal($("pickerModal"));
      return;
    }
    closeLayerFallback($("pickerModal"));
  }

  function pickMaterial(material){
    if (pickingRowIndex < 0 || pickingRowIndex >= rowsState.length) return;
    syncRowsStateFromDom();
    rowsState[pickingRowIndex].material_id = String(material.material_id || "");
    rowsState[pickingRowIndex].material_preview = material;
    renderRows();
    closePicker();
  }

  function renderPickerResults(list){
    var host = $("pickerResults");
    host.innerHTML = "";

    var arr = Array.isArray(list) ? list : [];
    $("pickerResultMeta").innerText = arr.length
      ? ("\uCD1D " + Number(arr.length).toLocaleString("ko-KR") + "\uAC74")
      : "\uAC80\uC0C9 \uACB0\uACFC\uAC00 \uC5C6\uC5B4\uC694.";
    if (!arr.length) return;

    var frag = document.createDocumentFragment();
    for (var i = 0; i < arr.length; i++){
      (function(item){
        var row = document.createElement("div");
        row.className = "list-row";

        var left = document.createElement("div");
        left.className = "list-row__left";
        if (item.image_file_id){
          var img = document.createElement("img");
          img.className = "thumb";
          img.alt = "자재 이미지";
          applyImageSource(img, item.image_file_id);
          left.appendChild(img);
        } else {
          left.innerHTML = '<span class="badge">IMG</span>';
        }

        var main = document.createElement("div");
        main.className = "list-row__main";
        main.innerHTML =
          '<div class="list-row__title">' + esc((item.brand ? (item.brand + " ") : "") + (item.name || "")) + '</div>' +
          '<div class="list-row__desc">ID ' + esc(item.material_id || "") + ' | \uADDC\uACA9 ' + esc(item.spec || "-") + ' | \uB2E8\uC704 ' + esc(item.unit || "-") + ' | \uB2E8\uAC00 ' + Number(item.unit_price || 0).toLocaleString("ko-KR") + '\uC6D0</div>';

        var right = document.createElement("div");
        right.className = "list-row__right";
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn btn--primary btn--sm";
        btn.innerText = "\uC120\uD0DD";
        btn.addEventListener("click", function(){ pickMaterial(item); });
        right.appendChild(btn);

        row.appendChild(left);
        row.appendChild(main);
        row.appendChild(right);
        frag.appendChild(row);

        var divider = document.createElement("div");
        divider.className = "divider";
        frag.appendChild(divider);
      })(arr[i]);
    }
    host.appendChild(frag);
  }

  function searchPicker(btn){
    var q = String($("pickerQuery").value || "").trim();
    if (!q || q.length < 2) {
      setStatus("검색어를 두 글자 이상 입력해 주세요.", "error", 2200);
      $("pickerResultMeta").innerText = "검색어를 2글자 이상 입력해요.";
      return;
    }

    var reqId = ++pickerSearchReqSeq;
    runWithLoading(btn, function(done){
      google.script.run
        .withSuccessHandler(function(list){
          done();
          if (reqId !== pickerSearchReqSeq) return;
          renderPickerResults(list || []);
        })
        .withFailureHandler(function(err){
          done();
          if (reqId !== pickerSearchReqSeq) return;
          if (handleAdminSessionExpired(err)) return;
          setStatus("자재를 찾지 못했어요.", "error", 3200);
          toast("자재 검색에 실패했어요.", "error");
        })
        .searchMaterials(q, pw(), 40);
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    stripSensitiveQueryParams();
    initBentoNav();
    if (window.AppUI && typeof window.AppUI.enhanceModal === "function") {
      window.AppUI.enhanceModal($("pickerModal"));
    }
    restorePw();
    maybeUpgradeToSessionToken(function(){
      patchNavLinks();
      rowsState = [];
      hasSearchResultLoaded = false;
      renderRows();
      setStatus("", "", 0);
    });

    $("adminPw").addEventListener("input", function(){ pw(); });
    $("btnLock").addEventListener("click", clearPw);
    $("btnReload").addEventListener("click", function(){ loadRows($("btnReload")); });
    $("btnSearchFilters").addEventListener("click", function(){ loadRows($("btnSearchFilters")); });
    $("btnNew").addEventListener("click", function(){
      rowsState.unshift(defaultRow());
      renderRows();
      setStatus("새 행을 추가했어요.", "success", 1800);
    });

    $("filterQuery").addEventListener("keydown", function(e){
      if (e.key === "Enter") loadRows($("btnSearchFilters"));
    });
    $("filterTradeCode").addEventListener("keydown", function(e){
      if (e.key === "Enter") loadRows($("btnSearchFilters"));
    });

    $("btnPickerSearch").addEventListener("click", function(){ searchPicker($("btnPickerSearch")); });
    $("pickerQuery").addEventListener("keydown", function(e){
      if (e.key === "Enter") searchPicker($("btnPickerSearch"));
    });

    $("pickerModal").addEventListener("click", function(e){
      if (window.AppUI) return;
      if (e.target === $("pickerModal")) closePicker();
    });
  });
})();
</script>

</body>
</html>
